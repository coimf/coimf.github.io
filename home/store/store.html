<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store - Coimf</title>
    <script defer src="/home/indexAnim.js"></script>
    <link rel="stylesheet" href="store.css">
    <script defer src="/home/cursorScript.js"></script>

</head>
<body>
    <div class="cursor"></div>
    <nav class="navbar-el">
        <ul class="navbar">
            <button onclick="window.location.href='/home/welcome/index.html'" class="navbar-item">
                <a class="navbar-item-link logo">
                    Home
                </a>
            </button>
            <button onclick="window.location.href='/home/brachistochrones/brachistochrones.html'" class="navbar-item">
                <a class="navbar-item-link">
                    Brachistochrone
                </a>
            </button>
            <button onclick="window.location.href='/home/colleges/colleges.html'" class="navbar-item">
              <a class="navbar-item-link">
                  Colleges
              </a>
          </button>
            <button onclick="window.location.href='/home/store/store.html'" class="navbar-item">
                <a class="navbar-item-link">
                    Store
                </a>
              </button>
            <button onclick="window.location.href='/home/about/about.html'" class="navbar-item">
                <a class="navbar-item-link">
                    About Me
                </a>
            </button>
        </ul>
    </nav>
    <div class="wrapper">
      <header>
        <img src="/pictures/store-background.png" class="background">
        <h1 class="hidden foreground" style="background-image: none; text-align: center; font-size: 170px; text-shadow: 0px 1px 24px #ffffff;">
          Store
        </h1>
        <p class="background" style="bottom: -166%; text-align: center; color: rgb(220, 220, 220); font-size: 1.8vw; text-shadow: 0px 0px 14px white;">Scroll down to view products<br>
      </p>
      </header>
      <section></section>
      <section id="product-grid foreground">
        <h1 style="font-size: 50px; margin-bottom: 14vh; text-shadow: 0px 0px 2.5vh white;">
          Choose a product
        </h1>
        <ul class="product-grid">
          <button class="product-frame" id="gaming-water-btn" onclick="window.location.href='/home/store/product/gaming-water.html'" style="background: url(/pictures/product-water.png); background-size: 25vw 25vw;">
            <a class="product-name">
              Gaming Water
            </a>
          </button>
          <button class="product-frame" id="gaming-chair-btn" onclick="window.location.href='/home/store/product/gaming-chair.html'" style="background: url(/pictures/product-chair.png); background-size: 25vw 25vw;">
            <a class="product-name">
              Gaming Chair
            </a>
          </button>
          <button class="product-frame" id="gaming-heater-btn" onclick="window.location.href='/home/store/product/gaming-heater.html'" style="background: url(/pictures/product-heater.png); background-size: 25vw 25vw;">
            <a class="product-name">
              Gaming Heater
            </a>
          </button>
        </ul>
      </section>
      <div id="back">
      <button id="back-button" onclick="window.location.href='/home/welcome/index.html'">
        <svg style="scale: 0.5; margin-left: -31px" width="31" height="58" viewBox="0 0 31 58" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 29L30.75 0.421162L30.75 57.5788L0 29Z" fill="white"/>
        </svg>              
        <p style="margin-left: 8px; margin-right: -16px;">
        Back to Home
        </p>
      </button>
      </div>
    </div>
    
</body>
</html>
